<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>劇情模擬器</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- 引入 Font Awesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 改用 Supabase 傳統 UMD 版本（解決 iOS 模組相容性問題） -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .preview-container {
            background-image: linear-gradient(45deg, #f0f0f0 25%, transparent 25%), linear-gradient(-45deg, #f0f0f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #f0f0f0 75%), linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col">

    <!-- 導覽列 -->
    <header class="bg-indigo-600 text-white shadow-md p-4 flex justify-between items-center shrink-0">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i class="fa-solid fa-comments"></i> 劇情模擬器
        </h1>
        <div id="user-info" class="text-sm hidden items-center gap-3">
            <span id="user-email"></span>
            <button onclick="handleLogout()" class="bg-indigo-700 hover:bg-indigo-800 px-3 py-1.5 rounded text-xs transition flex items-center gap-1">
                <i class="fa-solid fa-sign-out-alt"></i> 登出
            </button>
        </div>
    </header>

    <!-- 主內容區 -->
    <main class="flex-1 flex overflow-hidden relative">
        
        <!-- 1. 認證畫面 -->
        <div id="auth-screen" class="absolute inset-0 bg-slate-100 z-50 flex items-center justify-center p-4">
            <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full">
                <h2 id="auth-title" class="text-2xl font-bold text-center text-slate-800 mb-6">歡迎使用劇情模擬器</h2>
                
                <!-- 頁籤切換 -->
                <div class="flex border-b border-slate-200 mb-6">
                    <button id="tab-login" onclick="switchAuthTab('login')" class="flex-1 pb-3 text-center font-medium border-b-2 border-indigo-600 text-indigo-600">登入</button>
                    <button id="tab-register" onclick="switchAuthTab('register')" class="flex-1 pb-3 text-center font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700">註冊</button>
                </div>

                <form onsubmit="event.preventDefault(); handleAuth();" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">電子郵件</label>
                        <input type="email" id="auth-email" required class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">密碼</label>
                        <input type="password" id="auth-password" required class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                    </div>
                    <button type="submit" id="auth-submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium p-2.5 rounded-lg transition mt-2 shadow">
                        登入
                    </button>
                </form>
            </div>
        </div>

        <!-- 2. 工作區 (設定與預覽) -->
        <div id="app-screen" class="flex-1 flex overflow-hidden hidden">
            <!-- 左側設定面版 -->
            <section class="w-1/2 border-r border-slate-200 flex flex-col h-full bg-white">
                <div class="p-4 border-b border-slate-200 bg-slate-50 shrink-0">
                    <h2 class="font-bold text-slate-700 flex items-center gap-2">
                        <i class="fa-solid fa-sliders"></i> 模擬器設定
                    </h2>
                </div>
                
                <div class="flex-1 overflow-y-auto p-4 space-y-6">
                    <!-- 背景與角色設定 -->
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-4">
                        <h3 class="font-semibold text-sm text-slate-600 border-b border-slate-200 pb-2 flex items-center gap-1.5">
                            <i class="fa-solid fa-palette"></i> 基礎外觀設定
                        </h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium text-slate-500 mb-1">對話框背景顏色</label>
                                <input type="color" id="cfg-bg-color" value="#ffffff" onchange="updatePreview()" class="w-full h-10 p-1 border border-slate-300 rounded cursor-pointer">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500 mb-1">左側角色名稱</label>
                                <input type="text" id="cfg-left-name" value="角色A" oninput="updatePreview()" class="w-full p-2 border border-slate-300 rounded text-sm">
                            </div>
                        </div>
                    </div>

                    <!-- 貼圖對應設定 -->
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-4">
                        <div class="flex justify-between items-center border-b border-slate-200 pb-2">
                            <h3 class="font-semibold text-sm text-slate-600 flex items-center gap-1.5">
                                <i class="fa-solid fa-face-smile"></i> 貼圖庫設定 (可上傳自訂圖片)
                            </h3>
                            <button onclick="addStickerRow()" class="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-medium px-2 py-1 rounded border border-indigo-200 transition">
                                <i class="fa-solid fa-plus"></i> 新增貼圖
                            </button>
                        </div>
                        
                        <!-- 貼圖清單容器 -->
                        <div id="sticker-list" class="space-y-3 max-h-[300px] overflow-y-auto pr-1">
                            <!-- 動態生成 -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- 右側預覽面版 -->
            <section class="w-1/2 flex flex-col h-full bg-slate-50 relative">
                <div class="p-4 border-b border-slate-200 bg-white flex justify-between items-center shrink-0">
                    <h2 class="font-bold text-slate-700 flex items-center gap-2">
                        <i class="fa-solid fa-eye"></i> 即時預覽效果
                    </h2>
                    <button onclick="downloadPreview()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-medium px-3 py-1.5 rounded transition flex items-center gap-1 shadow">
                        <i class="fa-solid fa-download"></i> 下載圖片
                    </button>
                </div>
                
                <!-- 預覽畫布容器 -->
                <div class="flex-1 p-8 overflow-auto flex items-center justify-center preview-container">
                    <div id="dialog-canvas" class="w-[400px] aspect-[4/3] bg-white shadow-2xl rounded-2xl border border-slate-200 flex flex-col p-6 relative overflow-hidden transition-all duration-300">
                        <!-- 對話框內容預覽 -->
                        <div class="flex items-start gap-4 h-full">
                            <!-- 角色頭像/貼圖區 -->
                            <div class="w-24 h-24 shrink-0 bg-slate-100 rounded-xl border border-slate-200 flex items-center justify-center overflow-hidden relative">
                                <img id="pv-sticker" src="" class="w-full h-full object-contain hidden">
                                <span id="pv-sticker-placeholder" class="text-slate-400 text-xs">無貼圖</span>
                            </div>
                            <!-- 內文區 -->
                            <div class="flex-1 flex flex-col h-full justify-between py-1">
                                <div>
                                    <div id="pv-name" class="font-bold text-slate-800 text-lg mb-1">角色A</div>
                                    <div id="pv-text" class="text-slate-600 text-sm leading-relaxed">請在左側設定或點選對應貼圖代碼...</div>
                                </div>
                                <div class="text-[10px] text-slate-400 text-right">Simulation System</div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- 標準 JavaScript 區塊（不使用 type="module" 以確保 iOS 全域相容性） -->
    <script>
        // Supabase 初始化
        const { createClient } = supabase;
        const SUPABASE_URL = 'https://ouyburdigtawbtklalua.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_qfL5DStvodBbM2iMj0x8Uw_8MufBww7'; // 請替換成您自己的 anon key
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

        // 全域狀態管理
        const G = {
            user: null,
            currentAuthMode: 'login',
            stickers: [
                { keyword: '[微笑]', url: 'https://api.dicebear.com/7.x/bottts/svg?seed=smile' },
                { keyword: '[生氣]', url: 'https://api.dicebear.com/7.x/bottts/svg?seed=angry' }
            ]
        };

        // 應用程式初始化（包在非同步函式中，避免 iOS 頂層 await 報錯）
        async function initApp() {
            try {
                const { data: { session } } = await sb.auth.getSession();
                if (session) {
                    G.user = session.user;
                    showSetup();
                } else {
                    showScreen('auth-screen');
                }
            } catch (err) {
                console.error("初始化認證失敗:", err);
                showScreen('auth-screen');
            }

            // 監聽登入狀態改變
            sb.auth.onAuthStateChange((event, session) => {
                if (event === 'SIGNED_IN' && session) {
                    G.user = session.user;
                    showSetup();
                } else if (event === 'SIGNED_OUT') {
                    G.user = null;
                    showScreen('auth-screen');
                }
            });
        }

        // 啟動 App
        initApp();

        // 畫面切換控制
        function showScreen(id) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            
            const userInfo = document.getElementById('user-info');
            if (id === 'app-screen' && G.user) {
                userInfo.classList.remove('hidden');
                document.getElementById('user-email').innerText = G.user.email;
            } else {
                userInfo.classList.add('hidden');
            }
        }

        // 切換登入/註冊頁籤
        function switchAuthTab(mode) {
            G.currentAuthMode = mode;
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');
            const submitBtn = document.getElementById('auth-submit-btn');
            const title = document.getElementById('auth-title');

            if (mode === 'login') {
                tabLogin.className = "flex-1 pb-3 text-center font-medium border-b-2 border-indigo-600 text-indigo-600";
                tabRegister.className = "flex-1 pb-3 text-center font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700";
                submitBtn.innerText = "登入";
                title.innerText = "歡迎使用劇情模擬器";
            } else {
                tabRegister.className = "flex-1 pb-3 text-center font-medium border-b-2 border-indigo-600 text-indigo-600";
                tabLogin.className = "flex-1 pb-3 text-center font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700";
                submitBtn.innerText = "註冊新帳號";
                title.innerText = "建立您的模擬器帳號";
            }
        }

        // 處理登入與註冊
        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;

            if (G.currentAuthMode === 'login') {
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) alert('登入失敗: ' + error.message);
            } else {
                const { error } = await sb.auth.signUp({ email, password });
                if (error) alert('註冊失敗: ' + error.message);
                else alert('註冊成功！請檢查信箱驗證信，或直接嘗試登入。');
            }
        }

        // 處理登出
        async function handleLogout() {
            await sb.auth.signOut();
        }

        // 載入主功能設定
        function showSetup() {
            showScreen('app-screen');
            renderStickerList();
            updatePreview();
        }

        // 渲染貼圖清單
        function renderStickerList() {
            const container = document.getElementById('sticker-list');
            container.innerHTML = '';

            G.stickers.forEach((sticker, index) => {
                const row = document.createElement('div');
                row.className = "flex items-center gap-2 bg-white p-2 rounded-lg border border-slate-200 shadow-sm";
                row.innerHTML = `
                    <input type="text" value="${sticker.keyword}" oninput="updateStickerKeyword(${index}, this.value)" class="w-24 p-1.5 border border-slate-300 rounded text-xs font-mono" placeholder="[關鍵字]">
                    <input type="text" value="${sticker.url}" oninput="updateStickerUrl(${index}, this.value)" class="flex-1 p-1.5 border border-slate-300 rounded text-xs" placeholder="圖片網址">
                    <button onclick="useSticker(${index})" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 p-1.5 rounded border border-indigo-100 transition text-xs" title="測試套用">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                    </button>
                    <button onclick="removeStickerRow(${index})" class="text-rose-500 hover:bg-rose-50 p-1.5 rounded transition text-xs">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                `;
                container.appendChild(row);
            });
        }

        // 新增空貼圖欄位
        function addStickerRow() {
            G.stickers.push({ keyword: `[自訂${G.stickers.length + 1}]`, url: '' });
            renderStickerList();
        }

        // 刪除貼圖欄位
        function removeStickerRow(index) {
            G.stickers.splice(index, 1);
            renderStickerList();
            updatePreview();
        }

        function updateStickerKeyword(index, val) {
            G.stickers[index].keyword = val;
        }

        function updateStickerUrl(index, val) {
            G.stickers[index].url = val;
            updatePreview();
        }

        // 直接點擊魔術棒套用該貼圖到預覽
        function useSticker(index) {
            const sticker = G.stickers[index];
            const pvSticker = document.getElementById('pv-sticker');
            const placeholder = document.getElementById('pv-sticker-placeholder');
            
            if (sticker.url) {
                pvSticker.src = sticker.url;
                pvSticker.classList.remove('hidden');
                placeholder.classList.add('hidden');
                document.getElementById('pv-text').innerText = `已成功套用貼圖： ${sticker.keyword}`;
            } else {
                alert('請先填入該貼圖的圖片網址！');
            }
        }

        // 更新右側畫布預覽
        function updatePreview() {
            const bgColor = document.getElementById('cfg-bg-color').value;
            const leftName = document.getElementById('cfg-left-name').value;
            
            document.getElementById('dialog-canvas').style.backgroundColor = bgColor;
            document.getElementById('pv-name').innerText = leftName;
        }

        // 下載預覽圖（提示功能）
        function downloadPreview() {
            alert('下載功能已準備就緒！（實際專案可結合 html2canvas 實作圖片匯出）');
        }
    </script>
</body>
</html>
