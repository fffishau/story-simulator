<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>劇情模擬器</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0d0d14; --bg2:#13131f; --bg3:#1a1a2e;
  --accent:#7c6bff; --accent2:#b48cff;
  --text:#e8e6f0; --text-dim:#8a87a0;
  --border:#2a2840; --card:#16162a;
  --red:#ff5050; --green:#50ff90;
}
body { background:var(--bg); color:var(--text); font-family:'PingFang TC','Noto Sans TC',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; }

/* ── 共用 ── */
.screen { width:100%; max-width:480px; min-height:100vh; display:flex; flex-direction:column; }
.hidden { display:none !important; }

input[type=text], input[type=email], input[type=password], textarea, select {
  width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px;
  padding:11px 14px; color:var(--text); font-size:14px; outline:none;
  transition:border-color .2s; font-family:inherit; margin-bottom:8px;
}
input:focus, textarea:focus, select:focus { border-color:var(--accent); }
input::placeholder, textarea::placeholder { color:var(--text-dim); font-size:13px; }
select option { background:var(--bg3); }

.btn {
  width:100%; border:none; border-radius:10px; padding:14px;
  font-size:15px; font-weight:600; cursor:pointer; font-family:inherit;
  transition:opacity .2s, transform .1s; letter-spacing:.05em;
}
.btn:hover { opacity:.9; transform:translateY(-1px); }
.btn:active { transform:translateY(0); }
.btn-primary { background:linear-gradient(135deg,var(--accent),#5a4fcf); color:#fff; }
.btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text-dim); }
.btn-sm { padding:8px 14px; font-size:13px; width:auto; border-radius:8px; }

.card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; margin-bottom:16px; }
.section-label {
  font-size:12px; font-weight:600; color:var(--accent); letter-spacing:.1em;
  margin-bottom:12px; display:flex; align-items:center; gap:8px;
}
.section-label::before { content:''; display:block; width:3px; height:14px; background:var(--accent); border-radius:2px; }

.msg { font-size:13px; padding:10px 12px; border-radius:8px; margin-bottom:10px; }
.msg-error { background:rgba(255,80,80,.1); border:1px solid rgba(255,80,80,.3); color:#ff8080; }
.msg-success { background:rgba(80,255,144,.1); border:1px solid rgba(80,255,144,.3); color:#50ff90; }

.toggle-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.toggle-label { font-size:13px; color:var(--text-dim); }
.toggle { width:40px; height:22px; background:var(--bg3); border:1px solid var(--border); border-radius:11px; cursor:pointer; position:relative; transition:background .2s; }
.toggle.on { background:var(--accent); border-color:var(--accent); }
.toggle::after { content:''; position:absolute; width:16px; height:16px; background:#fff; border-radius:50%; top:2px; left:2px; transition:left .2s; }
.toggle.on::after { left:20px; }

.note { font-size:11px; color:var(--text-dim); line-height:1.6; margin-top:6px; }
.note a { color:var(--accent); text-decoration:none; }

/* ── 登入畫面 ── */
#auth-screen { padding:40px 24px; gap:0; }
.auth-title { text-align:center; padding:24px 0 28px; }
.auth-title h1 { font-size:28px; font-weight:700; letter-spacing:.1em; background:linear-gradient(135deg,var(--accent2),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:6px; }
.auth-title p { font-size:11px; letter-spacing:.25em; color:var(--text-dim); text-transform:uppercase; }
.auth-tabs { display:flex; gap:8px; margin-bottom:16px; }
.auth-tab { flex:1; padding:10px; background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text-dim); font-size:13px; cursor:pointer; font-family:inherit; transition:all .2s; }
.auth-tab.active { border-color:var(--accent); color:var(--accent2); background:rgba(124,107,255,.1); }
.forgot-link { font-size:12px; color:var(--accent); cursor:pointer; text-align:right; margin-bottom:12px; margin-top:-4px; }

/* ── 設定畫面 ── */
#setup-screen { padding:20px 24px 40px; gap:0; overflow-y:auto; }
.setup-header { display:flex; align-items:center; justify-content:space-between; padding:16px 0 20px; }
.setup-header h2 { font-size:18px; font-weight:700; }
.user-email { font-size:12px; color:var(--text-dim); }

.char-preview-img { width:100%; height:140px; border-radius:8px; object-fit:cover; object-position:top; border:1px solid var(--border); margin-bottom:10px; display:none; }
.char-preview-img.show { display:block; }

.sticker-list { display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
.sticker-row { display:flex; gap:8px; align-items:center; }
.sticker-row input { margin-bottom:0; flex:1; }
.sticker-row input:first-child { flex:0 0 90px; }
.sticker-del { background:rgba(255,80,80,.15); border:1px solid rgba(255,80,80,.3); color:#ff8080; border-radius:6px; padding:6px 10px; cursor:pointer; font-size:13px; white-space:nowrap; font-family:inherit; }

/* ── 遊戲畫面 ── */
#game-screen { }
.game-header { padding:13px 18px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:var(--bg2); position:sticky; top:0; z-index:10; }
.chapter-label { font-size:11px; color:var(--text-dim); }
.header-right { display:flex; align-items:center; gap:8px; }
.char-tag { background:rgba(124,107,255,.2); border:1px solid var(--accent); border-radius:20px; padding:3px 11px; font-size:12px; color:var(--accent2); }
.icon-btn { background:none; border:1px solid var(--border); border-radius:6px; color:var(--text-dim); font-size:13px; cursor:pointer; padding:3px 8px; transition:all .2s; }
.icon-btn.active { border-color:var(--accent); color:var(--accent2); }

#char-image-area { position:relative; width:100%; max-height:260px; overflow:hidden; display:none; }
#char-image-area.show { display:block; }
#char-image-game { width:100%; height:260px; object-fit:cover; object-position:top; display:block; }
#char-image-area::after { content:''; position:absolute; bottom:0; left:0; right:0; height:90px; background:linear-gradient(transparent,var(--bg)); }

.story-area { flex:1; padding:18px 18px 8px; overflow-y:auto; }
.story-text { font-size:15px; line-height:1.95; color:var(--text); white-space:pre-wrap; min-height:100px; }

.sticker-display { margin:10px 0; }
.sticker-display img { max-width:120px; max-height:120px; border-radius:8px; }

.speaking-indicator { display:none; align-items:center; gap:6px; font-size:11px; color:var(--accent); margin:8px 0; }
.speaking-indicator.active { display:flex; }
.s-dot { width:5px; height:5px; background:var(--accent); border-radius:50%; animation:pulse 1s ease-in-out infinite; }
.s-dot:nth-child(2) { animation-delay:.2s; }
.s-dot:nth-child(3) { animation-delay:.4s; }
@keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }

.inner-note { margin:14px 0; background:var(--bg3); border-left:3px solid var(--accent); border-radius:0 8px 8px 0; padding:13px 15px; font-size:13px; color:var(--text-dim); line-height:1.7; }
.inner-note-title { font-size:11px; color:var(--accent); letter-spacing:.1em; margin-bottom:7px; }

.choices-area { padding:10px 18px 18px; display:flex; flex-direction:column; gap:9px; }
.choice-btn { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 15px; color:var(--text); font-size:14px; cursor:pointer; text-align:left; transition:all .2s; font-family:inherit; line-height:1.5; }
.choice-btn:hover { border-color:var(--accent); background:rgba(124,107,255,.08); }
.choice-btn:disabled { opacity:.4; cursor:not-allowed; }

.bottom-bar { display:flex; justify-content:center; gap:12px; padding:11px 18px; border-top:1px solid var(--border); background:var(--bg2); flex-wrap:wrap; }
.bar-btn { background:none; border:none; color:var(--text-dim); font-size:12px; cursor:pointer; padding:4px 8px; border-radius:4px; font-family:inherit; transition:color .2s; }
.bar-btn:hover { color:var(--accent2); }

.disclaimer { font-size:11px; color:var(--text-dim); opacity:.35; text-align:center; padding:12px 20px 20px; line-height:1.6; }
</style>
</head>
<body>

<!-- ══ 登入畫面 ══ -->
<div id="auth-screen" class="screen hidden">
  <div class="auth-title">
    <h1>劇情模擬器</h1>
    <p>AI Interactive Story</p>
  </div>
  <div id="auth-msg"></div>
  <div class="auth-tabs">
    <button class="auth-tab active" onclick="switchAuthTab('login')">登入</button>
    <button class="auth-tab" onclick="switchAuthTab('register')">註冊</button>
  </div>
  <input type="email" id="auth-email" placeholder="電子信箱">
  <input type="password" id="auth-password" placeholder="密碼（至少6位）">
  <div class="forgot-link" id="forgot-link" onclick="showForgotPassword()">忘記密碼？</div>
  <button class="btn btn-primary" onclick="handleAuth()">登入</button>
  <p class="disclaimer">本工具為個人興趣製作，角色人設請自行負責，與任何官方作品無關聯。</p>
</div>

<!-- ══ 設定畫面 ══ -->
<div id="setup-screen" class="screen hidden">
  <div class="setup-header">
    <h2>角色設定</h2>
    <div style="text-align:right">
      <div class="user-email" id="user-email-display"></div>
      <button class="btn btn-ghost btn-sm" style="margin-top:4px" onclick="signOut()">登出</button>
    </div>
  </div>

  <div id="setup-msg"></div>

  <!-- 玩家資料 -->
  <div class="card">
    <div class="section-label">我的檔案</div>
    <input type="text" id="player-name" placeholder="你在故事中的名字" maxlength="10">
  </div>

  <!-- 角色設定 -->
  <div class="card">
    <div class="section-label">角色設定</div>
    <input type="text" id="char-name" placeholder="角色名字">
    <input type="text" id="char-image-url" placeholder="角色立繪圖片網址（選填）" oninput="previewImg(this.value)">
    <img id="char-preview" class="char-preview-img" alt="預覽">
    <p class="note" style="margin-bottom:10px">圖片先上傳到 <a href="https://imgur.com" target="_blank">Imgur</a> 或 <a href="https://postimages.org" target="_blank">PostImages</a>，連結結尾需是 .jpg/.png/.webp</p>
    <textarea id="char-prompt" placeholder="角色人設Prompt（個性、說話方式、背景設定、對玩家的態度...）" style="min-height:110px;resize:vertical;line-height:1.6;margin-bottom:0"></textarea>
  </div>

  <!-- AI 模型 -->
  <div class="card">
    <div class="section-label">AI 模型</div>
    <select id="model-select" onchange="updateModelUI()">
      <option value="deepseek">DeepSeek（推薦，角色扮演最穩）</option>
      <option value="openai">ChatGPT / GPT-4o</option>
      <option value="grok">Grok（xAI）</option>
      <option value="gemini">Gemini（Google）</option>
      <option value="claude">Claude（Anthropic）</option>
    </select>
    <input type="text" id="ai-api-key" placeholder="API Key">
    <p class="note" id="model-note">到 platform.deepseek.com 申請，費用極低</p>
  </div>

  <!-- 語音設定 -->
  <div class="card">
    <div class="section-label">語音設定（選填）</div>
    <div class="toggle-row">
      <span class="toggle-label">啟用語音</span>
      <div class="toggle" id="voice-toggle" onclick="toggleEl('voice-toggle','voiceEnabled')"></div>
    </div>
    <input type="text" id="fish-key" placeholder="Fish Audio API Key">
    <input type="text" id="fish-model-id" placeholder="Fish Audio 聲音模型 ID">
    <p class="note">到 <a href="https://fish.audio" target="_blank">fish.audio</a> 申請Key並訓練聲音模型後填入</p>
  </div>

  <!-- 貼圖設定 -->
  <div class="card">
    <div class="section-label">自定義貼圖（選填）</div>
    <p class="note" style="margin-bottom:10px">填入觸發詞和對應圖片網址，AI回應包含觸發詞時自動顯示貼圖</p>
    <div class="sticker-list" id="sticker-list"></div>
    <button class="btn btn-ghost btn-sm" onclick="addStickerRow()">＋ 新增貼圖</button>
  </div>

  <button class="btn btn-primary" style="margin-bottom:12px" onclick="saveAndStart()">儲存並開始劇情</button>
  <button class="btn btn-ghost" onclick="loadExisting()">讀取上次的劇情</button>
</div>

<!-- ══ 遊戲畫面 ══ -->
<div id="game-screen" class="screen hidden">
  <div class="game-header">
    <span class="chapter-label" id="chapter-label">劇情中</span>
    <div class="header-right">
      <button class="icon-btn" id="sound-btn" onclick="toggleSound()" title="語音開關">🔇</button>
      <span class="char-tag" id="char-tag">角色</span>
    </div>
  </div>

  <div id="char-image-area">
    <img id="char-image-game" alt="角色立繪">
  </div>

  <div class="story-area" id="story-area">
    <div class="story-text" id="story-text"></div>
    <div class="sticker-display" id="sticker-display"></div>
    <div class="speaking-indicator" id="speaking-indicator">
      <div class="s-dot"></div><div class="s-dot"></div><div class="s-dot"></div>
      <span>語音生成中...</span>
    </div>
    <div id="inner-note-area"></div>
    <div id="error-area"></div>
  </div>

  <div class="choices-area" id="choices-area"></div>

  <div class="bottom-bar">
    <button class="bar-btn" onclick="showInnerNote()">💭 角色心聲</button>
    <button class="bar-btn" onclick="goSetup()">⚙️ 設定</button>
    <button class="bar-btn" onclick="newStory()">🔄 新劇情</button>
    <button class="bar-btn" onclick="signOut()">登出</button>
  </div>
</div>

<script>
// ══════════════════════════════════════
//  Supabase 初始化
// ══════════════════════════════════════
const SUPABASE_URL = 'https://ouyburdigtawbtklalua.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qfL5DStvodBbM2iMj0x8Uw_8MufBww7';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ══════════════════════════════════════
//  API 端點
// ══════════════════════════════════════
const ENDPOINTS = {
  deepseek: { url:'https://api.deepseek.com/v1/chat/completions', model:'deepseek-chat' },
  openai:   { url:'https://api.openai.com/v1/chat/completions',   model:'gpt-4o' },
  grok:     { url:'https://api.x.ai/v1/chat/completions',         model:'grok-3-latest' },
  gemini:   { url:'https://generativelanguage.googleapis.com/v1beta/openai/chat/completions', model:'gemini-2.0-flash' },
  claude:   { url:'https://api.anthropic.com/v1/messages',        model:'claude-sonnet-4-6' },
};

const MODEL_NOTES = {
  deepseek: '到 platform.deepseek.com 申請，費用極低',
  openai:   '到 platform.openai.com 申請',
  grok:     '到 console.x.ai 申請',
  gemini:   '到 aistudio.google.com 申請，有免費額度',
  claude:   '到 console.anthropic.com 申請',
};

// ══════════════════════════════════════
//  狀態
// ══════════════════════════════════════
let G = {
  user: null,
  convId: null,
  playerName: '',
  charName: '',
  charPrompt: '',
  charImageUrl: '',
  modelKey: 'deepseek',
  aiKey: '',
  fishKey: '',
  fishModelId: '',
  voiceEnabled: false,
  soundMuted: false,
  stickers: [],
  history: [],
  isLoading: false,
};

// ══════════════════════════════════════
//  初始化：檢查登入狀態
// ══════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    G.user = session.user;
    showSetup();
  } else {
    showScreen('auth-screen');
  }
});

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) {
    G.user = session.user;
    showSetup();
  } else if (event === 'SIGNED_OUT') {
    G.user = null;
    showScreen('auth-screen');
  }
});

// ══════════════════════════════════════
//  畫面切換
// ══════════════════════════════════════
function showScreen(id) {
  ['auth-screen','setup-screen','game-screen'].forEach(s => {
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

// ══════════════════════════════════════
//  登入/註冊
// ══════════════════════════════════════
let authMode = 'login';

function switchAuthTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t,i) => {
    t.classList.toggle('active', (mode==='login'&&i===0)||(mode==='register'&&i===1));
  });
  document.querySelector('#auth-screen .btn-primary').textContent = mode==='login' ? '登入' : '註冊';
  document.getElementById('forgot-link').style.display = mode==='login' ? 'block' : 'none';
}

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const msgEl = document.getElementById('auth-msg');

  if (!email || !password) { showMsg(msgEl,'請填寫信箱和密碼','error'); return; }

  if (authMode === 'login') {
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) showMsg(msgEl, error.message, 'error');
  } else {
    const { error } = await sb.auth.signUp({ email, password });
    if (error) showMsg(msgEl, error.message, 'error');
    else showMsg(msgEl,'註冊成功！請檢查信箱確認連結後再登入','success');
  }
}

async function showForgotPassword() {
  const email = document.getElementById('auth-email').value.trim();
  const msgEl = document.getElementById('auth-msg');
  if (!email) { showMsg(msgEl,'請先填寫信箱','error'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email);
  if (error) showMsg(msgEl, error.message, 'error');
  else showMsg(msgEl,'重設密碼連結已寄出，請檢查信箱','success');
}

async function signOut() {
  await sb.auth.signOut();
}

// ══════════════════════════════════════
//  設定畫面
// ══════════════════════════════════════
async function showSetup() {
  showScreen('setup-screen');
  document.getElementById('user-email-display').textContent = G.user?.email || '';
  renderStickerList();

  // 嘗試讀取上次儲存的設定
  const { data } = await sb.from('conversations')
    .select('*')
    .eq('user_id', G.user.id)
    .order('updated_at', { ascending: false })
    .limit(1)
    .single();

  if (data) {
    G.convId = data.id;
    document.getElementById('char-name').value = data.char_name || '';
    document.getElementById('char-prompt').value = data.char_prompt || '';
    document.getElementById('char-image-url').value = data.char_image_url || '';
    document.getElementById('fish-model-id').value = data.fish_model_id || '';
    if (data.char_image_url) previewImg(data.char_image_url);
    if (data.stickers) {
      G.stickers = data.stickers;
      renderStickerList();
    }
  }
}

function updateModelUI() {
  const k = document.getElementById('model-select').value;
  document.getElementById('model-note').textContent = MODEL_NOTES[k] || '';
}

function previewImg(url) {
  const img = document.getElementById('char-preview');
  if (url && url.match(/\.(jpg|jpeg|png|webp|gif)(\?.*)?$/i)) {
    img.src = url; img.classList.add('show');
    img.onerror = () => img.classList.remove('show');
  } else { img.classList.remove('show'); }
}

// 貼圖列表
function renderStickerList() {
  const list = document.getElementById('sticker-list');
  list.innerHTML = '';
  G.stickers.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'sticker-row';
    row.innerHTML = `
      <input type="text" placeholder="觸發詞" value="${s.keyword||''}" oninput="G.stickers[${i}].keyword=this.value" style="margin-bottom:0">
      <input type="text" placeholder="圖片網址" value="${s.url||''}" oninput="G.stickers[${i}].url=this.value" style="margin-bottom:0">
      <button class="sticker-del" onclick="removeSticker(${i})">刪除</button>`;
    list.appendChild(row);
  });
}

function addStickerRow() {
  G.stickers.push({ keyword:'', url:'' });
  renderStickerList();
}

function removeSticker(i) {
  G.stickers.splice(i, 1);
  renderStickerList();
}

async function saveAndStart() {
  G.playerName  = document.getElementById('player-name').value.trim() || '你';
  G.charName    = document.getElementById('char-name').value.trim() || '他';
  G.charPrompt  = document.getElementById('char-prompt').value.trim();
  G.charImageUrl= document.getElementById('char-image-url').value.trim();
  G.modelKey    = document.getElementById('model-select').value;
  G.aiKey       = document.getElementById('ai-api-key').value.trim();
  G.fishKey     = document.getElementById('fish-key').value.trim();
  G.fishModelId = document.getElementById('fish-model-id').value.trim();

  const msgEl = document.getElementById('setup-msg');

  if (!G.charPrompt) { showMsg(msgEl,'請填寫角色人設Prompt','error'); return; }
  if (!G.aiKey)      { showMsg(msgEl,'請填寫AI API Key','error'); return; }

  // 儲存到Supabase
  const payload = {
    user_id: G.user.id,
    char_name: G.charName,
    char_prompt: G.charPrompt,
    char_image_url: G.charImageUrl,
    fish_model_id: G.fishModelId,
    stickers: G.stickers,
    history: [],
    updated_at: new Date().toISOString(),
  };

  let res;
  if (G.convId) {
    res = await sb.from('conversations').update(payload).eq('id', G.convId).select().single();
  } else {
    res = await sb.from('conversations').insert(payload).select().single();
  }

  if (res.error) { showMsg(msgEl,'儲存失敗：'+res.error.message,'error'); return; }
  G.convId = res.data.id;
  G.history = [];
  startGame();
}

async function loadExisting() {
  const { data } = await sb.from('conversations')
    .select('*').eq('user_id', G.user.id)
    .order('updated_at',{ascending:false}).limit(1).single();

  if (!data) { showMsg(document.getElementById('setup-msg'),'找不到之前的劇情','error'); return; }

  G.convId      = data.id;
  G.charName    = data.char_name;
  G.charPrompt  = data.char_prompt;
  G.charImageUrl= data.char_image_url;
  G.fishModelId = data.fish_model_id;
  G.stickers    = data.stickers || [];
  G.history     = data.history  || [];
  G.playerName  = document.getElementById('player-name').value.trim() || '你';
  G.modelKey    = document.getElementById('model-select').value;
  G.aiKey       = document.getElementById('ai-api-key').value.trim();
  G.fishKey     = document.getElementById('fish-key').value.trim();

  if (!G.aiKey) { showMsg(document.getElementById('setup-msg'),'請填寫AI API Key','error'); return; }

  startGame();
  // 重播最後幾段對話
  if (G.history.length > 0) {
    const last = G.history.filter(h=>h.role==='assistant').pop();
    if (last) {
      const { story } = parseAI(last.content);
      document.getElementById('story-text').textContent = '……（讀取上次劇情）\n\n' + story;
      renderChoices(['繼續劇情...']);
    }
  }
}

// ══════════════════════════════════════
//  遊戲啟動
// ══════════════════════════════════════
function startGame() {
  showScreen('game-screen');
  document.getElementById('char-tag').textContent = G.charName;
  document.getElementById('chapter-label').textContent = `與 ${G.charName} 的故事`;

  if (G.charImageUrl) {
    const area = document.getElementById('char-image-area');
    const img  = document.getElementById('char-image-game');
    img.src = G.charImageUrl;
    img.onload  = () => area.classList.add('show');
    img.onerror = () => area.classList.remove('show');
  }

  updateSoundBtn();

  if (G.history.length === 0) showOpening();
}

async function showOpening() {
  const msg = `劇情現在開始。${G.playerName}剛剛出現在你面前，請描寫開場場景，結尾給出2至3個選項：\n【選項A】...\n【選項B】...\n【選項C】...`;
  await sendAI(msg);
}

// ══════════════════════════════════════
//  選擇
// ══════════════════════════════════════
async function makeChoice(choice) {
  if (G.isLoading) return;
  const el = document.getElementById('story-text');
  el.textContent += `\n\n——${G.playerName}：${choice}\n\n`;
  clearChoices(); clearError();
  await sendAI(choice);
}

// ══════════════════════════════════════
//  送給 AI
// ══════════════════════════════════════
async function sendAI(userMsg) {
  G.isLoading = true;
  disableChoices(true);
  G.history.push({ role:'user', content:userMsg });

  const systemPrompt = buildSystem();
  const ep = ENDPOINTS[G.modelKey];

  try {
    let aiText = '';

    if (G.modelKey === 'claude') {
      // Claude 用不同格式
      const resp = await fetch(ep.url, {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'x-api-key':G.aiKey, 'anthropic-version':'2023-06-01' },
        body: JSON.stringify({ model:ep.model, max_tokens:600, system:systemPrompt, messages:G.history }),
      });
      if (!resp.ok) { const e=await resp.json().catch(()=>({})); throw new Error(e.error?.message||`HTTP ${resp.status}`); }
      const d = await resp.json();
      aiText = d.content?.[0]?.text || '';
    } else {
      // OpenAI 相容格式（DeepSeek/GPT/Grok/Gemini）
      const resp = await fetch(ep.url, {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${G.aiKey}` },
        body: JSON.stringify({ model:ep.model, max_tokens:600, messages:[{role:'system',content:systemPrompt},...G.history] }),
      });
      if (!resp.ok) { const e=await resp.json().catch(()=>({})); throw new Error(e.error?.message||`HTTP ${resp.status}`); }
      const d = await resp.json();
      aiText = d.choices?.[0]?.message?.content || '';
    }

    G.history.push({ role:'assistant', content:aiText });

    const { story, choices } = parseAI(aiText);
    await typeText(story);
    checkStickers(story);
    if (G.voiceEnabled && !G.soundMuted && G.fishKey && G.fishModelId) await speakText(story);
    renderChoices(choices);

    // 存到雲端
    await sb.from('conversations').update({ history:G.history, updated_at:new Date().toISOString() }).eq('id',G.convId);

  } catch(err) {
    showError(`連線失敗：${err.message}`);
  } finally {
    G.isLoading = false;
    disableChoices(false);
  }
}

function buildSystem() {
  return `${G.charPrompt}

玩家名字是「${G.playerName}」。
用第二人稱（你/妳）推進劇情，每次回應150字以內。
結尾必須給出2至3個選項：
【選項A】選項文字
【選項B】選項文字
只輸出劇情和選項，不要任何說明。`;
}

// ══════════════════════════════════════
//  Fish Audio 語音
// ══════════════════════════════════════
async function speakText(text) {
  const clean = text.replace(/【選項[A-D]】[\s\S]*/g,'').trim();
  if (!clean) return;
  document.getElementById('speaking-indicator').classList.add('active');
  try {
    const resp = await fetch('https://api.fish.audio/v1/tts', {
      method:'POST',
      headers:{ 'Authorization':`Bearer ${G.fishKey}`, 'Content-Type':'application/json' },
      body: JSON.stringify({ text:clean, reference_id:G.fishModelId, format:'mp3' }),
    });
    if (!resp.ok) throw new Error(`Fish Audio ${resp.status}`);
    const blob = await resp.blob();
    const url  = URL.createObjectURL(blob);
    const audio = new Audio(url);
    // iOS需要用戶互動後才能播放，這裡加個保護
    try { await audio.play(); } catch(e) { console.warn('音頻播放需要用戶互動'); }
    audio.onended = () => URL.revokeObjectURL(url);
  } catch(e) { console.warn('語音失敗：',e.message); }
  finally { document.getElementById('speaking-indicator').classList.remove('active'); }
}

// ══════════════════════════════════════
//  貼圖觸發
// ══════════════════════════════════════
function checkStickers(text) {
  const display = document.getElementById('sticker-display');
  display.innerHTML = '';
  const found = G.stickers.find(s => s.keyword && text.includes(s.keyword));
  if (found && found.url) {
    const img = document.createElement('img');
    img.src = found.url;
    img.alt = found.keyword;
    display.appendChild(img);
  }
}

// ══════════════════════════════════════
//  解析 AI 回應
// ══════════════════════════════════════
function parseAI(text) {
  const re = /【選項[A-D]】(.+?)(?=【選項|$)/gs;
  const choices = [];
  let m;
  while ((m = re.exec(text)) !== null) choices.push(m[1].trim());
  const story = text.replace(/【選項[A-D]】[\s\S]*/g,'').trim();
  return { story: story||text, choices: choices.length ? choices : ['繼續...'] };
}

// ══════════════════════════════════════
//  打字機
// ══════════════════════════════════════
async function typeText(text) {
  const el = document.getElementById('story-text');
  const base = el.textContent;
  let i = 0;
  await new Promise(r => {
    function t() {
      if (i < text.length) {
        el.textContent = base + text.substring(0,i+1);
        i++;
        document.getElementById('story-area').scrollTop = 99999;
        setTimeout(t, 16);
      } else r();
    }
    t();
  });
}

// ══════════════════════════════════════
//  角色心聲
// ══════════════════════════════════════
function showInnerNote() {
  const area = document.getElementById('inner-note-area');
  if (area.innerHTML) { area.innerHTML=''; return; }
  area.innerHTML = `<div class="inner-note"><div class="inner-note-title">📖 ${G.charName}的備忘錄</div>（在程式碼的 showInnerNote 函數中，可以加入角色的內心獨白內容，讓玩家感受角色視角。）</div>`;
  area.scrollIntoView({behavior:'smooth'});
}

// ══════════════════════════════════════
//  語音開關
// ══════════════════════════════════════
function toggleSound() {
  G.soundMuted = !G.soundMuted;
  updateSoundBtn();
}

function updateSoundBtn() {
  const btn = document.getElementById('sound-btn');
  const hasVoice = G.voiceEnabled && G.fishKey && G.fishModelId;
  btn.textContent = (hasVoice && !G.soundMuted) ? '🔊' : '🔇';
  btn.classList.toggle('active', hasVoice && !G.soundMuted);
}

function toggleEl(id, key) {
  G[key] = !G[key];
  document.getElementById(id).classList.toggle('on', G[key]);
}

// ══════════════════════════════════════
//  其他控制
// ══════════════════════════════════════
function goSetup() { showSetup(); }

async function newStory() {
  if (!confirm('確定要開始新劇情？目前記憶將清空。')) return;
  G.history = [];
  document.getElementById('story-text').textContent = '';
  document.getElementById('sticker-display').innerHTML = '';
  clearChoices(); clearError();
  document.getElementById('inner-note-area').innerHTML = '';
  await showOpening();
}

function renderChoices(choices) {
  const area = document.getElementById('choices-area');
  area.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c;
    btn.onclick = () => makeChoice(c);
    area.appendChild(btn);
  });
}

function clearChoices() { document.getElementById('choices-area').innerHTML=''; }
function disableChoices(d) { document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=d); }
function showError(msg) { document.getElementById('error-area').innerHTML=`<div class="msg msg-error">${msg}</div>`; }
function clearError() { document.getElementById('error-area').innerHTML=''; }

function showMsg(el, text, type) {
  el.innerHTML = `<div class="msg msg-${type}">${text}</div>`;
  setTimeout(()=>{ el.innerHTML=''; }, 5000);
}
</script>
